name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_DEFAULT_VERSION: "3.13"
  COVERAGE_THRESHOLD: 90
  BRANCH_COVERAGE_THRESHOLD: 85

jobs:
  quality:
    name: Quality Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/setup.py', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest pytest-cov pytest-xdist pytest-timeout
          pip install ruff pylint mypy
          pip install bandit pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f setup.py ]; then pip install -e .; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github
        continue-on-error: false

      - name: Run Ruff formatter check
        run: |
          ruff format --check .
        continue-on-error: false

      - name: Run Pylint
        run: |
          pylint **/*.py --output-format=colorized --fail-under=8.0 || true
          pylint **/*.py --exit-zero --output-format=json > pylint-report.json
        continue-on-error: false

      - name: Run MyPy type checking
        run: |
          mypy . --install-types --non-interactive --ignore-missing-imports --show-error-codes --pretty
        continue-on-error: false

      - name: Run Bandit security scan
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . -ll -f screen
        continue-on-error: false

      - name: Run pip-audit for dependency vulnerabilities
        run: |
          pip-audit --desc --format json --output pip-audit-report.json || true
          pip-audit --desc
        continue-on-error: false

      - name: Verify no critical vulnerabilities
        run: |
          if [ -f bandit-report.json ]; then
            HIGH_SEVERITY=$(jq '[.results[] | select(.issue_severity == "HIGH" or .issue_severity == "CRITICAL")] | length' bandit-report.json)
            if [ "$HIGH_SEVERITY" -gt 0 ]; then
              echo "Found $HIGH_SEVERITY critical/high severity issues"
              exit 1
            fi
          fi

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing \
                 --cov-branch --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
                 --junitxml=junit-report.xml \
                 -v --tb=short --maxfail=5 \
                 -n auto
        continue-on-error: false

      - name: Verify branch coverage threshold
        run: |
          BRANCH_COV=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(float(root.attrib['branch-rate']) * 100)")
          echo "Branch coverage: $BRANCH_COV%"
          if (( $(echo "$BRANCH_COV < ${{ env.BRANCH_COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "Branch coverage $BRANCH_COV% is below threshold ${{ env.BRANCH_COVERAGE_THRESHOLD }}%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == env.PYTHON_DEFAULT_VERSION
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports as artifacts
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_DEFAULT_VERSION
        with:
          name: coverage-reports-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
            junit-report.xml
          retention-days: 30

      - name: Upload security reports as artifacts
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_DEFAULT_VERSION
        with:
          name: security-reports-${{ matrix.python-version }}
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

      - name: Upload linting reports as artifacts
        uses: actions/upload-artifact@v4
        if: matrix.python-version == env.PYTHON_DEFAULT_VERSION
        with:
          name: linting-reports-${{ matrix.python-version }}
          path: |
            pylint-report.json
          retention-days: 30

  complexity:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install complexity tools
        run: |
          python -m pip install --upgrade pip
          pip install radon xenon mccabe

      - name: Run Radon complexity metrics
        run: |
          radon cc . -a -s --json > radon-cc.json
          radon cc . -a -s
          radon mi . -s --json > radon-mi.json
          radon mi . -s

      - name: Run Xenon for complexity threshold enforcement
        run: |
          xenon --max-absolute B --max-modules B --max-average A . || true

      - name: Upload complexity reports
        uses: actions/upload-artifact@v4
        with:
          name: complexity-reports
          path: |
            radon-cc.json
            radon-mi.json
          retention-days: 30

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel setuptools

      - name: Build distribution packages
        run: |
          python -m build

      - name: Check distribution packages
        run: |
          twine check dist/*

      - name: Upload distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/
          retention-days: 30

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [quality, complexity, build]
    if: always()
    
    steps:
      - name: Check quality gate status
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality checks failed"
            exit 1
          fi
          echo "All quality gates passed successfully"